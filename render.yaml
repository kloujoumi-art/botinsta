# =============================================================
#  BotInsta — Configuration Render.com
# =============================================================

services:
  - type: web
    name: botinsta
    env: python
    region: frankfurt
    buildCommand: "pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=./pw-browsers python -m playwright install chromium"
    startCommand: "python main.py --mode both"
    healthCheckPath: /health

    envVars:
      # Navigateur
      - key: HEADLESS
        value: "true"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/pw-browsers"

      # Flask
      - key: DASHBOARD_HOST
        value: "0.0.0.0"

      # Identifiants Instagram
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_PASSWORD
        sync: false

      # Session cookie (copier depuis le navigateur)
      - key: INSTAGRAM_SESSIONID
        sync: false

      # Comptes cibles
      - key: TARGET_ACCOUNTS
        sync: false

      # Limites journalieres
      - key: MAX_FOLLOWS_PER_DAY
        value: "25"
      - key: MAX_LIKES_PER_DAY
        value: "40"
      - key: MAX_PROFILE_VISITS_PER_DAY
        value: "80"
      - key: MAX_STORIES_PER_DAY
        value: "50"
      - key: MAX_REELS_PER_DAY
        value: "30"

      # Stockage (relatif au dossier app — fonctionne sans disque paye)
      - key: DATA_DIR
        value: "./data"
      - key: SESSIONS_DIR
        value: "./data/sessions"
      - key: LOG_FILE
        value: "./data/botinsta.log"

      # ── Facebook ──────────────────────────────────────────────────
      - key: FACEBOOK_C_USER
        sync: false
      - key: FACEBOOK_XS
        sync: false
      - key: FACEBOOK_EMAIL
        sync: false
      - key: FACEBOOK_PASSWORD
        sync: false
      - key: TARGET_FRIENDS
        sync: false
      - key: TARGET_PAGES
        sync: false
      - key: MAX_FRIEND_REQUESTS_PER_DAY
        value: "15"
      - key: FB_MAX_LIKES_PER_DAY
        value: "40"
      - key: FB_MAX_STORIES_PER_DAY
        value: "30"

      # Proxy optionnel
      - key: PROXY_URL
        value: ""

      # Logs
      - key: LOG_LEVEL
        value: "INFO"
